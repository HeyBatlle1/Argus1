services:
  argus-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: argus-daemon
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - ARGUS_DATA_DIR=/argus/data
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SUPABASE_ARGUS_URL=${SUPABASE_ARGUS_URL:-}
      - SUPABASE_ARGUS_SERVICE_KEY=${SUPABASE_ARGUS_SERVICE_KEY:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    ports:
      - "8888:8888"
      - "9000:9000"
    volumes:
      - argus-data:/argus/data
      - workspace:/workspace
    depends_on:
      - argus-workspace
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  argus-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        # NEXT_PUBLIC_* must be baked in at build time — this passes it to Dockerfile ARG
        - NEXT_PUBLIC_WS_URL=ws://localhost:9000/ws
    container_name: argus-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - argus-daemon
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  argus-workspace:
    build:
      context: .
      dockerfile: Dockerfile.workspace
    container_name: argus-workspace
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    # No host port mapping — only reachable by argus-daemon on the internal Docker network
    expose:
      - "9001"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

volumes:
  argus-data:
  workspace:

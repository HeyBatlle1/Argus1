services:
  argus-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: argus-daemon
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - ARGUS_DATA_DIR=/argus/data
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SUPABASE_ARGUS_URL=${SUPABASE_ARGUS_URL:-}
      - SUPABASE_ARGUS_SERVICE_KEY=${SUPABASE_ARGUS_SERVICE_KEY:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID:-}
      - ARGUS_WS_TOKEN=${ARGUS_WS_TOKEN:-}
    ports:
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:9000:9000"
    volumes:
      - argus-data:/argus/data
      - workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ~/.argus/mcp.json:/home/argus/.argus/mcp.json:ro
    depends_on:
      - argus-workspace
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  argus-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_WS_URL=ws://localhost:9000/ws
    container_name: argus-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - ARGUS_DAEMON_URL=http://argus-daemon:9000
      # Runtime only — served via /api/ws-token, never baked into client bundle
      - ARGUS_WS_TOKEN=${ARGUS_WS_TOKEN:-}
    depends_on:
      - argus-daemon
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  argus-workspace:
    build:
      context: .
      dockerfile: Dockerfile.workspace
    container_name: argus-workspace
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    environment:
      - WORKSPACE_EXEC_TOKEN=${WORKSPACE_EXEC_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - ARGUS_TRIAGE_ACTIVE=${ARGUS_TRIAGE_ACTIVE:-0}
      - ARGUS_DISCORD_ACTIVE=${ARGUS_DISCORD_ACTIVE:-0}
    ports:
      - "127.0.0.1:8081:8081"   # Static file server — agent-created HTML pages (browsable on host)
    expose:
      - "9001"        # Exec server — internal Docker network only
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

volumes:
  argus-data:
  workspace:

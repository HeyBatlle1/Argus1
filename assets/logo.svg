<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Argus — Secure Agent Runtime</title>
<desc>Ferris the Rust crab locked behind vault cage bars with amber accents. Built in Rust. Ferris stays locked in.</desc>

<defs>
  <filter id="barGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Vault interior — crab and bars both clipped to this -->
  <clipPath id="vaultInterior">
    <rect x="69" y="69" width="202" height="252" rx="4"/>
  </clipPath>
</defs>

<!-- Background -->
<rect width="400" height="400" rx="16" fill="#0d0d12"/>

<!-- Vault door -->
<rect x="60" y="60" width="220" height="270" rx="8" fill="#1a1a24" stroke="#c9a84c" stroke-width="2.5"/>
<rect x="70" y="70" width="200" height="250" rx="5" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.35"/>

<!-- Hinge bolts -->
<circle cx="63" cy="110" r="6" fill="#c9a84c" opacity="0.85"/>
<circle cx="63" cy="145" r="6" fill="#c9a84c" opacity="0.85"/>
<circle cx="63" cy="235" r="6" fill="#c9a84c" opacity="0.85"/>
<circle cx="63" cy="270" r="6" fill="#c9a84c" opacity="0.85"/>

<!-- Ferris — clipped to vault interior, muted so bars read first -->
<g clip-path="url(#vaultInterior)" opacity="0.55">
  <g transform="translate(168, 200)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="52" ry="38" fill="#6b2410"/>
    <ellipse cx="0" cy="-5" rx="34" ry="22" fill="none" stroke="#7a3015" stroke-width="1.5" opacity="0.5"/>
    <!-- Eyes -->
    <circle cx="-20" cy="-20" r="13" fill="#8a8070"/>
    <circle cx="-18" cy="-20" r="7" fill="#1a1a24"/>
    <circle cx="-15" cy="-23" r="2" fill="#4a4440"/>
    <circle cx="20" cy="-20" r="13" fill="#8a8070"/>
    <circle cx="22" cy="-20" r="7" fill="#1a1a24"/>
    <circle cx="25" cy="-23" r="2" fill="#4a4440"/>
    <!-- Antennae -->
    <line x1="-30" y1="-34" x2="-13" y2="-31" stroke="#4a1a08" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="13" y1="-31" x2="30" y2="-34" stroke="#4a1a08" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left claw arm -->
    <path d="M-50,0 Q-64,-8 -72,-12" fill="none" stroke="#6b2410" stroke-width="11" stroke-linecap="round"/>
    <ellipse cx="-72" cy="-12" rx="14" ry="10" fill="#6b2410" transform="rotate(-15 -72 -12)"/>
    <ellipse cx="-80" cy="-26" rx="10" ry="7" fill="#6b2410" transform="rotate(-30 -80 -26)"/>
    <!-- Right claw arm -->
    <path d="M50,0 Q64,-8 72,-12" fill="none" stroke="#6b2410" stroke-width="11" stroke-linecap="round"/>
    <ellipse cx="72" cy="-12" rx="14" ry="10" fill="#6b2410" transform="rotate(15 72 -12)"/>
    <ellipse cx="80" cy="-26" rx="10" ry="7" fill="#6b2410" transform="rotate(30 80 -26)"/>
    <!-- Legs -->
    <line x1="-40" y1="16" x2="-56" y2="32" stroke="#6b2410" stroke-width="5" stroke-linecap="round"/>
    <line x1="-26" y1="22" x2="-36" y2="40" stroke="#6b2410" stroke-width="5" stroke-linecap="round"/>
    <line x1="-10" y1="25" x2="-12" y2="44" stroke="#6b2410" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="16" x2="56" y2="32" stroke="#6b2410" stroke-width="5" stroke-linecap="round"/>
    <line x1="26" y1="22" x2="36" y2="40" stroke="#6b2410" stroke-width="5" stroke-linecap="round"/>
    <line x1="10" y1="25" x2="12" y2="44" stroke="#6b2410" stroke-width="5" stroke-linecap="round"/>
  </g>
</g>

<!-- Bars — on top of Ferris, same clip -->
<g clip-path="url(#vaultInterior)" filter="url(#barGlow)">
  <rect x="84"  y="68" width="5" height="254" fill="#c9a84c" opacity="0.52"/>
  <rect x="108" y="68" width="5" height="254" fill="#c9a84c" opacity="0.52"/>
  <rect x="132" y="68" width="5" height="254" fill="#c9a84c" opacity="0.52"/>
  <rect x="156" y="68" width="5" height="254" fill="#c9a84c" opacity="0.52"/>
  <rect x="180" y="68" width="5" height="254" fill="#c9a84c" opacity="0.52"/>
  <rect x="204" y="68" width="5" height="254" fill="#c9a84c" opacity="0.52"/>
  <rect x="228" y="68" width="5" height="254" fill="#c9a84c" opacity="0.52"/>
  <rect x="68" y="140" width="204" height="4" fill="#c9a84c" opacity="0.38"/>
  <rect x="68" y="248" width="204" height="4" fill="#c9a84c" opacity="0.38"/>
</g>

<!-- Combination lock dial (right) -->
<circle cx="310" cy="200" r="28" fill="#1a1a24" stroke="#c9a84c" stroke-width="3"/>
<circle cx="310" cy="200" r="16" fill="none" stroke="#c9a84c" stroke-width="2"/>
<circle cx="310" cy="200" r="4" fill="#c9a84c"/>
<line x1="310" y1="172" x2="310" y2="183" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
<line x1="310" y1="217" x2="310" y2="228" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
<line x1="282" y1="200" x2="293" y2="200" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
<line x1="327" y1="200" x2="338" y2="200" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
<line x1="290" y1="180" x2="298" y2="188" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
<line x1="322" y1="212" x2="330" y2="220" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
<line x1="290" y1="220" x2="298" y2="212" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
<line x1="322" y1="188" x2="330" y2="180" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>

<!-- Small bolt lock on vault door -->
<circle cx="170" cy="292" r="18" fill="none" stroke="#c9a84c" stroke-width="2"/>
<circle cx="170" cy="292" r="3" fill="#c9a84c"/>
<line x1="170" y1="292" x2="170" y2="277" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>

<!-- Padlock (below vault) -->
<g transform="translate(170, 346)">
  <rect x="-14" y="-6" width="28" height="22" rx="4" fill="#c9a84c"/>
  <path d="M-8,-6 Q-8,-22 0,-22 Q8,-22 8,-6" fill="none" stroke="#c9a84c" stroke-width="4" stroke-linecap="round"/>
  <circle cx="0" cy="6" r="4" fill="#0d0d12"/>
</g>

<!-- Wordmark -->
<text x="200" y="396" text-anchor="middle"
  font-family="'JetBrains Mono','Courier New',monospace"
  font-size="18" font-weight="300" letter-spacing="8" fill="#e0dbd0">ARGUS</text>

</svg>
